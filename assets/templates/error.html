<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/site/favicon.ico">
  <link rel="stylesheet" href="/site/reset.css">
  <link rel="stylesheet" href="/site/base.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <title th:text="${data.title}"></title>
  <style>
    .link {
      color: blue;
      text-decoration: underline;
    }

    .link:hover {
      text-decoration-thickness: 2px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="layout">
      <div th:replace="~{fragments/sidebar :: sidebar}"></div>
      <div class="core">
        <header th:replace="~{fragments/topbar :: topbar}"></header>
        <main class="content-container">
          <div class="content">
            <h1 th:text="${data.heading}"></h1>
            <p th:text="${data.message}"></p>
            <a class="link" th:if="${data.action != null}" th:href="${data.action.href}"
              th:text="${data.action.text}"></a>
          </div>
          <div th:replace="~{fragments/content-sidebar :: content-sidebar}"></div>
        </main>
      </div>
    </div>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>
</body>

</html>
