<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/site/favicon.ico">
  <link rel="stylesheet" href="/site/reset.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <title>Cafe.Home</title>
  <style>
    body {
      margin-left: 8px;
    }

    .navbar {
      display: flex;
      gap: 8px;
      width: fit-content;
      margin-top: 24px;
    }

    .nav-link {
      border: 1px solid black;
      padding: 4px;
      background-color: #dddddd;
    }

    .nav-link:hover {
      color: gray;
    }

    .space-lists {
      display: flex;
      flex-direction: column;
      gap: 50px;
      width: 500px;
    }

    .space-item {
      padding: 8px;
    }

    .space-name-row {
      padding: 2px;
      padding-left: 8px;
      background-color: rgb(210, 171, 212);
      font-size: 20px;
      font-weight: bold;
    }

    .section-lists {
      display: flex;
      flex-direction: column;
      background-color: rgb(227, 212, 228);
    }

    .section-item {
      padding: 4px;
      padding-left: 24px;
    }

    .section-item:not(:last-child) {
      border-bottom: 1px solid black;
    }

    .section-name {
      font-size: 18px;
      font-weight: bold;
    }

    .section-name:hover {
      color: #545248;
    }

    .section-description {
      font-size: 14px;
    }
  </style>
</head>

<body>
  <h1>Cafe.Home</h1>
  <p th:text="'Hello. Welcome back.'"></p>

  <ul class="space-lists" th:if="${not #lists.isEmpty(data.spaces)}">
    <li class="space-item" th:each="space : ${data.spaces}">
      <div>
        <p class="space-name-row" th:text="${space.name}"></p>
        <ul class="section-lists">
          <li class="section-item" th:each="section : ${space.sections}">
            <div>
              <span th:inline="text">
                <a th:href="'cafe/' + ${section.id}" class="section-name" th:text="${section.name}">
                </a>
                ([[${data.counts.getOrDefault(section.id, 0)}]] posts)
              </span>
              <p class="section-description" th:text="${section.description}"></p>
            </div>
          </li>
        </ul>
      </div>
    </li>
  </ul>

  <p th:if="${#lists.isEmpty(data.spaces)}">No spaces have been made yet ㅠㅠ</p>

  <div class="navbar">
    <a class="nav-link" href="/">Lobby</a>
    <a class="nav-link" href="/cafe">Cafe</a>
    <a class="nav-link" href="/profile">Profile</a>
  </div>
</body>

</html>
