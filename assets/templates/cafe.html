<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/site/favicon.ico">
  <link rel="stylesheet" href="/site/reset.css">
  <link rel="stylesheet" href="/site/base.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <title>Cafe.Home</title>
  <style>
    .space-lists {
      display: flex;
      flex-direction: column;
      gap: 50px;
      width: 500px;
    }

    .space-item {
      padding: 8px;
    }

    .space-name-row {
      padding: 2px;
      padding-left: 8px;
      background-color: rgb(210, 171, 212);
      font-size: 20px;
      font-weight: bold;
    }

    .section-lists {
      display: flex;
      flex-direction: column;
      background-color: rgb(227, 212, 228);
    }

    .section-item {
      padding: 4px;
      padding-left: 24px;
    }

    .section-item:not(:last-child) {
      border-bottom: 1px solid black;
    }

    .section-name {
      font-size: 18px;
      font-weight: bold;
    }

    .section-name:hover {
      color: #545248;
    }

    .section-description {
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="layout">
      <div th:replace="~{fragments/sidebar :: sidebar}"></div>
      <div class="core">
        <header th:replace="~{fragments/topbar :: topbar}"></header>
        <main class="content-container">
          <div class="content">
            <h1>Cafe.Home</h1>
            <p th:text="'Hello. Welcome back.'"></p>
            <ul class="space-lists" th:if="${not #lists.isEmpty(data.spaces)}">
              <li class="space-item" th:each="space : ${data.spaces}">
                <div>
                  <p class="space-name-row" th:text="${space.name}"></p>
                  <ul class="section-lists">
                    <li class="section-item" th:each="section : ${space.sections}">
                      <div>
                        <span th:inline="text">
                          <a th:href="'cafe/' + ${section.id}" class="section-name" th:text="${section.name}">
                          </a>
                          ([[${data.counts.getOrDefault(section.id, 0)}]] posts)
                        </span>
                        <p class="section-description" th:text="${section.description}"></p>
                      </div>
                    </li>
                  </ul>
                </div>
              </li>
            </ul>
            <p th:if="${#lists.isEmpty(data.spaces)}">No spaces have been made yet ㅠㅠ</p>
          </div>
          <div th:replace="~{fragments/content-sidebar :: content-sidebar}"></div>
        </main>
      </div>
    </div>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>
</body>

</html>
