<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/site/favicon.ico">
  <link rel="stylesheet" href="/site/reset.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <title>Cafe.CreateTopic</title>
  <style>
    body {
      margin-left: 8px;
    }

    .navbar {
      display: flex;
      gap: 8px;
      width: fit-content;
      margin-top: 24px;
    }

    .nav-link {
      border: 1px solid black;
      padding: 4px;
      background-color: #dddddd;
    }

    .nav-link:hover {
      color: gray;
    }

    .post-container {
      width: fit-content;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .post-section {
      display: flex;
      flex-direction: column;
      margin-top: 16px;
    }

    .post-textarea {
      width: 300px;
      height: 200px;
      resize: none;
      padding-right: 12px;
    }

    .post-submit {
      width: fit-content;
    }

    .post-status {
      color: black;
    }

    .topic-title-textarea {
      field-sizing: content;
      width: 300px;
      resize: none;
      padding-right: 12px;
    }

    .topic-author-input {
      width: 200px;
    }
  </style>
</head>

<body>
  <h1>Cafe.CreateTopic</h1>

  <form id="post-form" class="post-container">
    <p>Create a topic</p>
    <textarea id="topic-title-textarea" class="topic-title-textarea" placeholder="Title" maxlength="80"></textarea>
    <input id="topic-author-input" class="topic-author-input" type="text" placeholder="Author" maxlength="30" />
    <input id="topic-section-input" class="topic-section-input" type="text" placeholder="Section" maxlength="30" />
    <div class="post-section">
      <label for="post-textarea">Content</label>
      <textarea id="post-textarea" class="post-textarea" placeholder="Write your topic here..."></textarea>
    </div>
    <button type="submit" class="post-submit">Post</button>
  </form>
  <p id="post-status" class="post-status">Status: </p>

  <div class="navbar">
    <a class="nav-link" href="/">Lobby</a>
    <a class="nav-link" href="/cafe">Cafe</a>
    <a class="nav-link" href="/cafe/createtopic">Cafe.CreateTopic</a>
    <a class="nav-link" href="/profile">Profile</a>
  </div>

  <script>
    $(document).ready(function () {
      $("#post-form").submit(function (event) {
        postFormSubmitListener(event)
      })
    })

    function postFormSubmitListener(event) {
      event.preventDefault()
      changePostStatus(0)

      const titleText = $("#topic-title-textarea").val();
      const authorText = $("#topic-author-input").val();
      const sectionText = $("#topic-section-input").val();
      const postText = $("#post-textarea").val();
      const payload = { title: titleText, author: authorText, section: sectionText, content: postText }
      console.log(JSON.stringify(payload))

      fetch('/cafe/createtopic', {
        method: 'POST',
        body: JSON.stringify(payload)
      })
        .then(response => {
          if (response.ok) {
            console.log("Cafe post status: ", response.status)
            changePostStatus(2)
          }
        })
        .catch(error => {
          console.error('Error:', error)
          changePostStatus(1)
        });
    }

    function changePostStatus(code) {
      if (code == 0) {
        $("#post-status")
          .text("Status: Sending")
          .css("color", "#b68c3e")
      }
      if (code == 1) {
        $("#post-status")
          .text("Status: Failed")
          .css("color", "red")
      }
      if (code == 2) {
        $("#post-status")
          .text("Status: Success")
          .css("color", "green")
      }
    }
  </script>
</body>

</html>
