<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/site/favicon.ico">
  <link rel="stylesheet" href="/site/reset.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <title>Cafe</title>
  <style>
    body {
      margin-left: 8px;
    }

    .navbar {
      display: flex;
      gap: 8px;
      width: fit-content;
      margin-top: 24px;
    }

    .nav-link {
      border: 1px solid black;
      padding: 4px;
      background-color: #dddddd;
    }

    .nav-link:hover {
      color: gray;
    }
  </style>
</head>

<body>
  <h1>Cafe</h1>
  <p th:text="'Hello, ' + ${data.username} + '. Welcome back.'"></p>

  <ul class="space-lists" th:if="${not #lists.isEmpty(data.spaces)}">
    <li class="space-list-item" th:each="space : ${data.spaces}">
      <div>
        <p th:text="${space.name}"></p>
        <ul>
          <li th:each="section : ${space.sections}">
            <p th:text="${section.id} + ' ' + ${section.name}"></p>
          </li>
        </ul>
      </div>
    </li>
  </ul>

  <p th:if="${#lists.isEmpty(data.spaces)}">No spaces have been made yet ㅠㅠ</p>

  <div class="navbar">
    <a class="nav-link" href="/">Lobby</a>
    <a class="nav-link" href="/cafe">Cafe</a>
    <a class="nav-link" href="/cafeposts">Cafe.ListPosts</a>
    <a class="nav-link" href="/cafe/post">Cafe.NewPost</a>
    <a class="nav-link" href="/profile">Profile</a>
  </div>
</body>

</html>
