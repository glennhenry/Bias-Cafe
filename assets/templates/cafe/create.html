<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/site/favicon.ico">
  <link rel="stylesheet" href="/site/reset.css">
  <link rel="stylesheet" href="/site/base.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <title>Cafe.CreateTopic</title>
  <style>
    .post-container {
      width: fit-content;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .post-section {
      display: flex;
      flex-direction: column;
      margin-top: 16px;
    }

    .post-textarea {
      width: 300px;
      height: 200px;
      resize: none;
      padding-right: 12px;
    }

    .post-submit {
      width: fit-content;
    }

    .post-status {
      color: black;
    }

    .topic-title-textarea {
      field-sizing: content;
      width: 300px;
      resize: none;
      padding-right: 12px;
    }

    .topic-author-input {
      width: 200px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="layout">
      <div th:replace="~{fragments/sidebar :: sidebar}"></div>
      <div class="core">
        <header th:replace="~{fragments/topbar :: topbar}"></header>
        <main class="content-container">
          <div class="content">
            <div class="content">
              <h1>Cafe.CreateTopic</h1>
              <form id="post-form" class="post-container">
                <p>Create a topic</p>
                <textarea id="topic-title-textarea" class="topic-title-textarea" placeholder="Title"
                  maxlength="80"></textarea>
                <input id="topic-author-input" class="topic-author-input" type="text" placeholder="Author"
                  maxlength="30" />
                <div class="post-section">
                  <label for="post-textarea">Content</label>
                  <textarea id="post-textarea" class="post-textarea" placeholder="Write your topic here..."></textarea>
                </div>
                <button type="submit" class="post-submit">Post</button>
              </form>
              <p id="post-status" class="post-status">Status: </p>
            </div>
          </div>
          <div th:replace="~{fragments/content-sidebar :: content-sidebar}"></div>
        </main>
      </div>
    </div>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>

  <script>
    $(document).ready(function () {
      $("#post-form").submit(function (event) {
        postFormSubmitListener(event)
      })
    })

    function postFormSubmitListener(event) {
      event.preventDefault()
      changePostStatus(0)

      const titleText = $("#topic-title-textarea").val();
      const authorText = $("#topic-author-input").val();
      const postText = $("#post-textarea").val();
      const payload = { title: titleText, author: authorText, content: postText }
      console.log(JSON.stringify(payload))

      fetch(window.location.href, {
        method: 'POST',
        body: JSON.stringify(payload)
      })
        .then(response => {
          if (response.ok) {
            console.log("Cafe post status: ", response.status)
            changePostStatus(2)
          }
        })
        .catch(error => {
          console.error('Error:', error)
          changePostStatus(1)
        });
    }

    function changePostStatus(code) {
      if (code == 0) {
        $("#post-status")
          .text("Status: Sending")
          .css("color", "#b68c3e")
      }
      if (code == 1) {
        $("#post-status")
          .text("Status: Failed")
          .css("color", "red")
      }
      if (code == 2) {
        $("#post-status")
          .text("Status: Success")
          .css("color", "green")
      }
    }
  </script>
</body>

</html>
