<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/site/favicon.ico">
  <link rel="stylesheet" href="/site/reset.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <title>Lobby</title>
  <style>
    body {
      margin-left: 8px;
    }

    .navbar {
      display: flex;
      gap: 8px;
      width: fit-content;
      margin-top: 24px;
    }

    .nav-link {
      border: 1px solid black;
      padding: 4px;
      background-color: #dddddd;
    }

    .nav-link:hover {
      color: gray;
    }

    .posted-text {
      width: 500px;
    }

    .post-list-item {
      border: 1px solid black;
      list-style: none;
      padding: 4px;
    }

    .topic-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .topic-author-row {
      border-bottom: 1px solid black;
      padding-bottom: 4px;
    }

    .topic-author-name {
      font-style: italic;
    }

    .topic-content {
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <h1>Lobby</h1>
  <p th:text="'System time: ' + ${data.time}"></p>
  <p th:text="'Bias: ' + ${data.bias}"></p>

  <div class="posted-text">
    <h3>All topics:</h3>

    <ul th:if="${not #lists.isEmpty(data.topics)}">
      <li class="post-list-item" th:each="topic : ${data.topics}">
        <div>
          <p class="topic-title" th:text="${topic.title}"></p>
          <p class="topic-author-row" th:inline="text">
            Posted by <span class="topic-author-name" th:text="${topic.author}">Author Name</span> at <span
              class="js-format-date" th:data-raw-date="${topic.postedAt}">[[${topic.postedAt}]]</span>
          </p>

          <p class="topic-content" th:text="${topic.content}"></p>
        </div>
      </li>
    </ul>

    <p th:if="${#lists.isEmpty(data.topics)}">No posted texts available.</p>
  </div>

  <div class="navbar">
    <a class="nav-link" href="/">Lobby</a>
    <a class="nav-link" href="/cafe">Cafe</a>
    <a class="nav-link" href="/profile">Profile</a>
  </div>
  <script>
    function formatDate(millis) {
      const date = new Date(Number(millis))
      return date.toLocaleDateString() + ' ' + date.toLocaleTimeString()
    }

    $(document).ready(function () {
      $(".js-format-date").each(function () {
        const rawDate = $(this).attr('data-raw-date')
        $(this).text(formatDate(rawDate))
      })
    })
  </script>
</body>

</html>
