<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/site/favicon.ico">
  <link rel="stylesheet" href="/site/reset.css">
  <title>Lobby</title>
  <style>
    body {
      margin-left: 8px;
    }

    .navbar {
      display: flex;
      gap: 8px;
      width: fit-content;
      margin-top: 24px;
    }

    .nav-link {
      border: 1px solid black;
      padding: 4px;
      background-color: #dddddd;
    }

    .nav-link:hover {
      color: gray;
    }

    .posted-text {
      border: 1px solid black;
      padding: 4px;
      width: 500px;
    }
  </style>
</head>

<body>
  <h1>Lobby</h1>
  <p th:text="'System time: ' + ${data.time}"></p>
  <p th:text="'Bias: ' + ${data.bias}"></p>

  <div class="posted-text">
    <h3>Posted texts:</h3>

    <ul th:if="${not #lists.isEmpty(data.posts)}">
      <li th:each="post : ${data.posts}" th:text="${post}"></li>
    </ul>

    <p th:if="${#lists.isEmpty(data.posts)}">No posted texts available.</p>
  </div>

  <div class="navbar">
    <a class="nav-link" href="/">Lobby</a>
    <a class="nav-link" href="/cafe">Cafe</a>
    <a class="nav-link" href="/profile">Profile</a>
  </div>
</body>

</html>
