<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/site/favicon.ico">
  <link rel="stylesheet" href="/site/reset.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <title>Profile</title>
  <style>
    .navbar {
      display: flex;
      gap: 8px;
      width: fit-content;
      margin-top: 24px;
    }

    .nav-link {
      border: 1px solid black;
      padding: 4px;
      background-color: #dddddd;
    }

    .nav-link:hover {
      color: gray;
    }

    .topbar {
      position: fixed;
      top: 0;
      padding: 8px;
      border-bottom: 1px solid #ccc;
      overflow: hidden;
      width: 100%;
      height: 50px;
      background-color: #ffffff;
      z-index: 1;
    }

    .content {
      margin-top: 50px;
      padding-left: 8px;
      background-color: #ffffff;
    }
  </style>
</head>

<body>
  <div>
    <div class="topbar">
      <p>Hello</p>
    </div>
    <div class="content">
      <h1>Profile</h1>
      <div class="navbar">
        <a class="nav-link" href="/">Lobby</a>
        <a class="nav-link" href="/cafe">Cafe</a>
        <a class="nav-link" href="/profile">Profile</a>
      </div>
    </div>
  </div>
</body>

</html>
